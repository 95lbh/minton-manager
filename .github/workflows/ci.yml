name: CI

# push(main)·PR마다 자동 검증 → 깨진 코드가 배포되는 걸 차단.
# (check:db / e2e 는 실제 Supabase 비밀값·네트워크가 필요해 여기서는 제외 — 배포 전 로컬/별도 게이트로)
on:
  push:
    branches: [main]
  pull_request:

# 같은 브랜치의 이전 실행은 취소(자원 절약).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build (타입체크 포함)
        run: npm run build
        env:
          # 빌드는 Supabase 없이도 통과하도록 설계됨(hasSupabaseEnv 가드).
          # 안전 마진으로 형식만 맞춘 더미값 주입(실제 비밀 아님).
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_SITE_URL: https://www.myminton.com
