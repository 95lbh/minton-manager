<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>오프라인 · 배드민턴 매니저</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        color: #1e293b;
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 360px;
        text-align: center;
      }
      .dot {
        width: 56px;
        height: 56px;
        margin: 0 auto 16px;
        border-radius: 16px;
        background: #4281a4;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 28px;
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { font-size: 14px; color: #64748b; margin: 0 0 20px; line-height: 1.5; }
      button {
        height: 44px;
        padding: 0 20px;
        border: 0;
        border-radius: 10px;
        background: #4281a4;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="dot">🏸</div>
      <h1>오프라인 상태입니다</h1>
      <p>인터넷 연결을 확인해 주세요. 연결되면 다시 시도할 수 있어요.</p>
      <button onclick="location.reload()">다시 시도</button>
    </div>
  </body>
</html>
